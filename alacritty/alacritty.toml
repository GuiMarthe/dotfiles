# Alacritty Configuration (TOML format)
# Theme is loaded from themes/current.toml (managed by theme-switch script)

[general]
import = ["~/.config/alacritty/themes/current.toml"]

# Start tmux automatically
[terminal.shell]
program = "/bin/zsh"
args = ["-c", "/opt/homebrew/bin/tmux new-session -A -D -s main; exec zsh -l"]

[window]
opacity = 0.85  # 0.0 = fully transparent, 1.0 = fully opaque
blur = true     # macOS/KDE Wayland only - blurs content behind window


[font]
size = 12.0  # Default is usually 11.25 - increase to your preference

[[hints.enabled]]
hyperlinks = true
command = "open"
binding = { key = "O", mods = "Control|Shift" }
post_processing = true
mouse.enabled = true

[[keyboard.bindings]]
key = "Return"
mods = "Shift"
chars = "\u001b\r"
