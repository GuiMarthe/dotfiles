# Aerospace Configuration File
# Location: ~/.aerospace.toml or ~/.config/aerospace/aerospace.toml

# Start AeroSpace at login
start-at-login = true

# Normalizations - recommended to keep these enabled
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# Set default layouts
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

# Key mapping
[key-mapping]
preset = 'qwerty'

# Gaps configuration
[gaps]
inner.horizontal = 8
inner.vertical = 8
outer.left = 8
outer.bottom = 8
outer.top = 8
outer.right = 8

# Main mode bindings - Using Alt (Option) as super key
[mode.main.binding]

alt-shift-enter = ['fullscreen off', 'focus --boundaries-action wrap-around-the-workspace dfs-next', 'fullscreen']
# Focus windows
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

# Move windows
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# Layout toggles
alt-slash = 'layout tiles horizontal vertical'
alt-comma = 'layout accordion horizontal vertical'

# Float/tile toggle
alt-shift-space = 'layout floating tiling'

# Fullscreen with Alt+Enter
alt-enter = 'fullscreen'

# Original fullscreen binding
alt-f = 'fullscreen'

# Swap between last two focused windows with Alt+Space
alt-space = 'focus-back-and-forth'

# Move window to other monitor with Alt+Shift+Comma (<)
alt-shift-comma = 'move-node-to-monitor --wrap-around next'

alt-shift-minus = 'resize smart -50'
alt-shift-equal = 'resize smart +50'

alt-shift-c = 'reload-config'

alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-6 = 'workspace 6'
alt-7 = 'workspace 7'
alt-8 = 'workspace 8'
alt-9 = 'workspace 9'
alt-0 = 'workspace 10'

alt-a = 'workspace A'
alt-q = 'workspace Q'
alt-e = 'workspace E'
alt-d = 'workspace D'
alt-z = 'workspace Z'
alt-x = 'workspace X'
alt-s = 'workspace S'
alt-m = 'workspace M'
alt-r = 'workspace R'

alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'
alt-shift-4 = 'move-node-to-workspace 4'
alt-shift-5 = 'move-node-to-workspace 5'
alt-shift-6 = 'move-node-to-workspace 6'
alt-shift-7 = 'move-node-to-workspace 7'
alt-shift-8 = 'move-node-to-workspace 8'
alt-shift-9 = 'move-node-to-workspace 9'
alt-shift-0 = 'move-node-to-workspace 10'

alt-shift-a = 'move-node-to-workspace A'
alt-shift-q = 'move-node-to-workspace Q'
alt-shift-e = 'move-node-to-workspace E'
alt-shift-d = 'move-node-to-workspace D'
alt-shift-z = 'move-node-to-workspace Z'
alt-shift-x = 'move-node-to-workspace X'
alt-shift-s = 'move-node-to-workspace S'
alt-shift-m = 'move-node-to-workspace M'
alt-shift-r = 'move-node-to-workspace R'

# Resize mode bindings
[mode.resize.binding]
h = 'resize width -50'
j = 'resize height +50'
k = 'resize height -50'
l = 'resize width +50'
enter = 'mode main'
esc = 'mode main'


