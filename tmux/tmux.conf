# Basic settings
set -g default-terminal "tmux-256color"
set -g mouse on
set -g focus-events on

# Status bar
set -g status-position top
set -g status-justify left

# Theme-aware status bar (reads ~/.theme-mode)
if-shell '[ "$(cat ~/.theme-mode 2>/dev/null)" = "light" ]' {
  # Rose Pine Dawn
  set -g status-style 'bg=#faf4ed fg=#575279'
  set -g status-right '#[fg=#faf4ed,bg=#907aa9] %d/%m #[fg=#faf4ed,bg=#56949f] %H:%M:%S '
  setw -g window-status-current-style 'fg=#faf4ed bg=#575279 bold'
  setw -g window-status-current-format ' #I:#W '
  setw -g window-status-style 'fg=#797593 bg=#f2e9e1'
  setw -g window-status-format ' #I:#W#F '
  setw -g window-status-bell-style 'fg=#faf4ed bg=#b4637a bold'
} {
  # Ayu Dark
  set -g status-style 'bg=#0f1419 fg=#b3b1ad'
  set -g status-right '#[fg=#0f1419,bg=#e6b450] %d/%m #[fg=#b3b1ad,bg=#272d38] %H:%M:%S '
  setw -g window-status-current-style 'fg=#e6b450 bg=#272d38 bold'
  setw -g window-status-current-format ' #I:#W '
  setw -g window-status-style 'fg=#5c6773 bg=#1f2430'
  setw -g window-status-format ' #I:#W#F '
  setw -g window-status-bell-style 'fg=#faf4ed bg=#f07178 bold'
}

# Performance
set-option -g repeat-time 0
set -s escape-time 0

# Keybindings
bind r source-file ~/.config/tmux/tmux.conf

# Vim-style pane navigation (no prefix needed)
bind -n M-h select-pane -L
bind -n M-l select-pane -R
bind -n M-k select-pane -U
bind -n M-j select-pane -D

# Cycle panes
bind-key C-b select-pane -t :.+
bind-key C-n select-pane -t :.-
bind-key g new-session

# Window behavior
set-option -g allow-rename off

# Open splits/windows in same directory
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Clipboard integration
set -g set-clipboard on
set -g @yank_selection 'clipboard'
set -g @yank_action 'copy-pipe-and-cancel'
set -g @override_copy_command 'pbcopy'

# Status bar sizing (moved from top to avoid duplication)
set -g status-left ''
set -g status-right-length 101
set -g status-left-length 20

# Plugins
set -g @plugin 'tmux-plugins/tpm'
# set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'wfxr/tmux-fzf-url'


#set -g @continuum-restore 'on'
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @resurrect-strategy-nvim 'session'

# # Initialize TPM (MUST be at bottom, no -b flag!)
set-environment -g PATH "/opt/homebrew/bin:/usr/local/bin:/bin:/usr/bin"
run '~/.config/tmux/plugins/tpm/tpm'
